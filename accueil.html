<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>LIVE - Accueil</title>
    <link rel="stylesheet" href="accueil.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="accueil.js"></script>
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <span class="tag_live">LIVE</span>
            <span class="tag_news">NEWS</span>
        </div>
        <nav class="auth_buttons">
            <a href="." class="btn_creation">Créer un compte</a>
            <a href="." class="btn_connexion">Connexion</a>
        </nav>
    </header>

    <main class="accueil_principale">

        <div class="content">

            <div class="txt_left">
                <div class="icon_titre">
                    <img src="images/icone_accueil.png" alt="icone" class="icon">
                    <h2>Décryptez le Monde En Temp Réel</h2>
                </div>
                <p class="description">
                    Accédez à des visualisations interactives sur l'économie, la politique et les mouvements sociaux.
                </p>

                <div class="dessins">
                    <div class="bulle">
                        <img src="images/economy.jpg" alt="economie">
                    </div>
                    <div class="bulle">
                        <img src="images/politique.jpg" alt="politique">
                    </div>
                    <div class="bulle">
                        <img src="images/social.jpg" alt="social">
                    </div>
                </div>

                <div class="exploration">
                    <a href="#" class="explorer">Explorer les Données</a>
                    <p class="compte">Pas encore de compte ? <a href="#" class="inscrie">Inscrivez-vous !</a></p>
                </div>
            </div>


            <div class="image_present">
                <div class="image_rect">
                    <div class="rect_bleu"></div>
                    <img src="images/image_accueil.jpg" alt="image de presentation" class="img_presentation">
                </div>
                <p class="comm">Suivez l'évolution des données gloables minute par minute.</p>
                </div>
            </div>
            
        </div>


    </main>

</body>

</html>
